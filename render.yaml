services:
  - type: web
    name: smile-cafe-pos
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: |
      python -c "
import os
from app import app, db
with app.app_context():
    print('Creating database tables...')
    db.create_all()
    print('Database tables created successfully!')
    from app import setup_smile_cafe_data
    setup_smile_cafe_data()
    print('Database initialized with data!')
"
      && python app.py
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
